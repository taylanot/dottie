[notebook]
dir = "$HOME/zettelkasten"
[note]
language = "en"
default-title = "Untitled"
filename = "{{id}}"
extension = "md"
template = "default.md"
id-charset = "alphanum"
id-length = 8
id-case = "lower"

[extra]
author = "otturan"

[group.daily]
paths = ["daily"]

[group.daily.note]
filename = "{{format-date now}}"
extension = "md"
template = "daily.md"

[group.meet]
paths = ["meet"]

[group.meet.note]
filename = "{{format-date now}}"
extension = "md"
template = "meet.md"

[format.markdown]
hashtags = true
colon-tags = true

[tool]
editor = "nvim"
shell = "/bin/zsh"
pager = "less -FIRX"
# fzf-preview = "bat -p --color always {-1}"

[filter]
recents = "--sort created- --created-after 'last two weeks'"

[alias]

edlast = "zk edit --limit 1 --sort modified- $argv"
recent = "zk edit --sort created- --created-after 'last two weeks' --interactive"
lucky = "zk list --quiet --format full --sort random --limit 1"
ls = "zk edit --interactive"

config = 'nvim "$HOME/.config/zk/config.toml"'

meet = 'zk new --no-input "$ZK_NOTEBOOK_DIR/meet" $argv'
ls-meet = 'zk edit "$ZK_NOTEBOOK_DIR/meet" --sort created- --interactive'

daily = 'zk new --no-input "$ZK_NOTEBOOK_DIR/daily"'
ls-daily = 'zk edit "$ZK_NOTEBOOK_DIR/daily" --sort created- --interactive'

update = "cd $../ZK_NOTEBOOK_DIR; git add -A; git commit -am 'updating'; git push; cd -"

[lsp]
[lsp.diagnostics]
wiki-title = "hint"
dead-link = "error"
missing-backlink = { level = "warning", position = "bottom" }
